<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Transcript Extractor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <!-- Google Fonts: Poppins for headings, Open Sans for body -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        /* CSS Reset & Base */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* CSS Custom Properties - Semantic Color Tokens */
        :root {
            --color-primary: #2563EB;
            --color-primary-hover: #1D4ED8;
            --color-primary-light: #DBEAFE;
            --color-secondary: #3B82F6;
            --color-cta: #F97316;
            --color-cta-hover: #EA580C;
            --color-success: #059669;
            --color-success-light: #D1FAE5;
            --color-error: #DC2626;
            --color-error-light: #FEE2E2;
            --color-info: #0284C7;
            --color-info-light: #E0F2FE;
            --color-surface: #FFFFFF;
            --color-surface-elevated: #F8FAFC;
            --color-surface-muted: #F1F5F9;
            --color-border: #E2E8F0;
            --color-border-hover: #CBD5E1;
            --color-text: #1E293B;
            --color-text-secondary: #475569;
            --color-text-muted: #64748B;
            --color-text-on-primary: #FFFFFF;
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --transition-fast: 150ms ease;
            --transition-normal: 200ms ease;
            --font-heading: 'Poppins', sans-serif;
            --font-body: 'Open Sans', sans-serif;
        }

        /* Base Styles */
        body {
            font-family: var(--font-body);
            background: var(--color-surface-muted);
            color: var(--color-text);
            min-height: 100vh;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Container */
        .container {
            max-width: 1120px;
            margin: 0 auto;
            background: var(--color-surface);
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: var(--color-primary);
            color: var(--color-text-on-primary);
            padding: 48px 40px;
            border-bottom: 1px solid var(--color-primary-hover);
        }
        
        .header-content {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }
        
        .header-icon {
            width: 56px;
            height: 56px;
            margin: 0 auto 16px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .header-icon svg {
            width: 32px;
            height: 32px;
            stroke: currentColor;
        }

        .header h1 {
            font-family: var(--font-heading);
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.025em;
        }
        
        .header p {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.85);
            max-width: 500px;
            margin: 0 auto;
        }

        /* Main Content */
        .main-content {
            padding: 40px;
            max-width: 800px;
            margin: 0 auto;
        }

        /* Steps */
        .step {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-xl);
            padding: 32px;
            margin-bottom: 24px;
            transition: border-color var(--transition-fast);
        }
        
        .step.active {
            border-color: var(--color-primary);
        }

        .step-header {
            display: flex;
            align-items: center;
            margin-bottom: 24px;
        }

        .step-number {
            width: 36px;
            height: 36px;
            background: var(--color-surface-muted);
            color: var(--color-text-secondary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-heading);
            font-weight: 600;
            font-size: 0.875rem;
            margin-right: 12px;
            flex-shrink: 0;
            transition: background var(--transition-fast), color var(--transition-fast);
        }
        
        .step.active .step-number {
            background: var(--color-primary);
            color: var(--color-text-on-primary);
        }

        .step-title {
            font-family: var(--font-heading);
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--color-text);
        }

        /* Form Elements */
        .form-group { margin-bottom: 20px; }
        
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 0.875rem;
            color: var(--color-text-secondary);
        }
        
        .form-control {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            font-family: var(--font-body);
            font-size: 0.9375rem;
            color: var(--color-text);
            background: var(--color-surface);
            transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
        }
        
        .form-control::placeholder {
            color: var(--color-text-muted);
        }
        
        .form-control:hover {
            border-color: var(--color-border-hover);
        }
        
        .form-control:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px var(--color-primary-light);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        
        .api-key-note {
            font-size: 0.75rem;
            color: var(--color-text-muted);
            margin-top: 4px;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 20px;
            border: none;
            border-radius: var(--radius-md);
            font-family: var(--font-body);
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: background var(--transition-fast), transform var(--transition-fast);
            text-decoration: none;
        }
        
        .btn:focus-visible {
            outline: 2px solid var(--color-primary);
            outline-offset: 2px;
        }
        
        .btn-primary {
            background: var(--color-primary);
            color: var(--color-text-on-primary);
        }
        
        .btn-primary:hover:not(:disabled) {
            background: var(--color-primary-hover);
        }
        
        .btn-primary:active:not(:disabled) {
            transform: scale(0.98);
        }
        
        .btn-cta {
            background: var(--color-cta);
            color: var(--color-text-on-primary);
        }
        
        .btn-cta:hover:not(:disabled) {
            background: var(--color-cta-hover);
        }
        
        .btn-success {
            background: var(--color-success);
            color: var(--color-text-on-primary);
        }
        
        .btn-success:hover:not(:disabled) {
            background: #047857;
        }
        
        .btn-outline {
            background: transparent;
            color: var(--color-primary);
            border: 1px solid var(--color-border);
        }
        
        .btn-outline:hover:not(:disabled) {
            background: var(--color-surface-muted);
            border-color: var(--color-border-hover);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-small {
            padding: 8px 14px;
            font-size: 0.8125rem;
        }
        
        .btn-icon {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }

        /* Progress */
        .progress-container {
            margin: 20px 0;
            display: none;
        }
        
        .progress-bar {
            width: 100%;
            height: 6px;
            background: var(--color-surface-muted);
            border-radius: 3px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: var(--color-primary);
            width: 0%;
            transition: width var(--transition-fast);
        }
        
        .progress-text {
            margin-top: 8px;
            font-size: 0.8125rem;
            color: var(--color-text-muted);
            text-align: center;
        }

        /* Video Grid */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
            gap: 10px;
            margin-top: 16px;
        }
        
        .video-card {
            position: relative;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            overflow: hidden;
            cursor: pointer;
            transition: border-color var(--transition-fast), box-shadow var(--transition-normal);
        }
        
        .video-card:hover {
            border-color: var(--color-primary);
            box-shadow: var(--shadow-md);
        }
        
        .video-card:focus-visible {
            outline: 2px solid var(--color-primary);
            outline-offset: 2px;
        }
        
        .video-card.selected {
            border-color: var(--color-success);
            background: var(--color-success-light);
        }
        
        .video-thumbnail {
            width: 100%;
            height: 98px;
            object-fit: cover;
            background: var(--color-surface-muted);
        }
        
        .video-info {
            padding: 8px;
        }
        
        .video-title {
            font-weight: 600;
            font-size: 0.75rem;
            line-height: 1.4;
            color: var(--color-text);
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .video-meta {
            font-size: 0.6875rem;
            color: var(--color-text-muted);
            display: flex;
            justify-content: space-between;
        }
        
        .checkbox-container {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: var(--radius-sm);
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .checkbox-container input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--color-success);
            cursor: pointer;
        }

        /* Selection Controls */
        .selection-controls {
            margin: 20px 0;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        /* Alerts */
        .alert {
            padding: 12px 16px;
            border-radius: var(--radius-md);
            margin: 12px 0;
            font-size: 0.875rem;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }
        
        .alert-icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            margin-top: 1px;
        }
        
        .alert-success {
            background: var(--color-success-light);
            color: #065F46;
        }
        
        .alert-error {
            background: var(--color-error-light);
            color: #991B1B;
        }
        
        .alert-info {
            background: var(--color-info-light);
            color: #075985;
        }

        /* Results */
        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .results-header h3 {
            font-family: var(--font-heading);
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--color-text);
        }
        
        .results-actions {
            display: flex;
            gap: 8px;
        }
        
        .result-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            margin-bottom: 12px;
            overflow: hidden;
        }
        
        .result-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            background: var(--color-surface-muted);
            cursor: pointer;
            transition: background var(--transition-fast);
        }
        
        .result-card-header:hover {
            background: var(--color-border);
        }
        
        .result-card-header h4 {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--color-text);
            margin: 0;
            flex: 1;
            margin-right: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .result-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }
        
        .result-icon {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
            flex-shrink: 0;
        }
        
        .result-icon.success { color: var(--color-success); }
        .result-icon.error { color: var(--color-error); }
        
        .transcript-content, .summary-content {
            padding: 16px;
            border-top: 1px solid var(--color-border);
            display: none;
        }
        
        .transcript-content pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 0.8125rem;
            line-height: 1.7;
            max-height: 400px;
            overflow-y: auto;
            background: var(--color-surface-muted);
            padding: 16px;
            border-radius: var(--radius-md);
        }
        
        .summary-content .summary-text {
            font-size: 0.875rem;
            line-height: 1.7;
            color: var(--color-text);
        }
        
        .summary-content .summary-text h2,
        .summary-content .summary-text h3 {
            margin: 16px 0 8px;
            font-family: var(--font-heading);
            font-weight: 600;
            color: var(--color-text);
        }
        
        .summary-content .summary-text li {
            margin-left: 20px;
            margin-bottom: 4px;
        }

        /* Loading Spinner */
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid var(--color-border);
            border-top-color: var(--color-primary);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Responsive */
        @media (max-width: 768px) {
            .header { padding: 32px 24px; }
            .header h1 { font-size: 1.5rem; }
            .main-content { padding: 24px; }
            .step { padding: 24px; }
            .form-row { grid-template-columns: 1fr; }
            .results-header { flex-direction: column; align-items: stretch; }
            .results-actions { flex-wrap: wrap; }
        }
        
        @media (max-width: 480px) {
            .video-grid { grid-template-columns: 1fr; }
            .selection-controls { flex-direction: column; }
            .selection-controls .btn { width: 100%; }
        }

        /* Reduced Motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <div class="header-icon">
                    <!-- Video Icon (Lucide) -->
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <path d="m10 13-3 2 3 2v-4z"/>
                    </svg>
                </div>
                <h1>YouTube Transcript Extractor</h1>
                <p>Extract transcripts from YouTube channels and summarize with AI</p>
            </div>
        </header>

        <div class="main-content">
            <!-- Step 1 -->
            <div class="step active" id="step1">
                <div class="step-header">
                    <div class="step-number">1</div>
                    <div class="step-title">Channel &amp; Settings</div>
                </div>
                <div class="form-group">
                    <label>YouTube Channel URL</label>
                    <input type="text" class="form-control" id="channelUrl"
                           placeholder="https://www.youtube.com/@channelname">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Date Range</label>
                        <select class="form-control" id="dateFilter">
                            <option value="this_month">This month</option>
                            <option value="last_3_months" selected>Last 3 months</option>
                            <option value="last_6_months">Last 6 months</option>
                            <option value="this_year">This year</option>
                            <option value="last_year">Last year</option>
                            <option value="all_time">All time</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Output Format</label>
                        <select class="form-control" id="outputFormat">
                            <option value="txt">Text (.txt)</option>
                            <option value="md">Markdown (.md)</option>
                            <option value="both" selected>Both</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Gemini API Key (optional &mdash; enables AI summaries)</label>
                    <input type="password" class="form-control" id="geminiApiKey"
                           placeholder="Enter your Gemini API key">
                    <div class="api-key-note">Your key is sent only to Google's API and is never stored.</div>
                </div>
                <button class="btn btn-primary" id="analyzeBtn" onclick="analyzeChannel()">
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    Analyze Channel
                </button>
                <div class="progress-container" id="analysisProgress">
                    <div class="progress-bar"><div class="progress-fill" id="analysisProgressFill"></div></div>
                    <div class="progress-text" id="analysisProgressText">Analyzing channel...</div>
                </div>
            </div>

            <!-- Step 2 -->
            <div class="step" id="step2">
                <div class="step-header">
                    <div class="step-number">2</div>
                    <div class="step-title">Select Videos</div>
                </div>
                <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
                    <div class="selection-controls" style="margin:0;">
                        <button class="btn btn-small btn-primary" onclick="selectAll()">Select All</button>
                        <button class="btn btn-small btn-primary" onclick="selectNone()">Select None</button>
                        <button class="btn btn-small btn-primary" onclick="selectTop(10)">Top 10</button>
                        <button class="btn btn-small btn-primary" onclick="selectTop(5)">Top 5</button>
                    </div>
                    <span id="videoCountDisplay" style="font-size:0.8125rem;color:var(--color-text-muted);"></span>
                </div>
                <div class="video-grid" id="videoGrid"></div>
                <div id="videoGridSentinel" style="height:1px;"></div>
                <div id="loadMoreIndicator" style="display:none;align-items:center;justify-content:center;padding:12px;gap:8px;">
                    <div class="loading-spinner"></div>
                    <span style="font-size:0.8125rem;color:var(--color-text-muted);">Loading more videos...</span>
                </div>
                <div style="margin-top:20px">
                    <button class="btn btn-cta" id="extractBtn" disabled onclick="extractTranscripts()">
                        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        Extract Transcripts (<span id="selectedCount">0</span> videos)
                    </button>
                </div>
                <div class="progress-container" id="extractionProgress">
                    <div class="progress-bar"><div class="progress-fill" id="extractionProgressFill"></div></div>
                    <div class="progress-text" id="extractionProgressText">Extracting transcripts...</div>
                </div>
            </div>

            <!-- Step 3 -->
            <div class="step" id="step3">
                <div class="step-header">
                    <div class="step-number">3</div>
                    <div class="step-title">Results</div>
                </div>
                <div id="resultsSection" style="display:none">
                    <div class="results-header">
                        <h3 id="resultsTitle">Extraction Complete</h3>
                        <div class="results-actions">
                            <button class="btn btn-small btn-outline" onclick="downloadAllZip()">
                                <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                                Download All (ZIP)
                            </button>
                            <button class="btn btn-small btn-success" id="summarizeAllBtn"
                                    onclick="summarizeAll()" style="display:none">
                                <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                                Summarize All
                            </button>
                        </div>
                    </div>
                    <div id="resultsContainer"></div>
                </div>
            </div>
        </div>
    </div>

<script>
let discoveredVideos = [];
let selectedVideos = new Set();
let extractedResults = [];

// Infinite scroll state
let currentContinuationToken = null;
let currentDateFilter = 'all_time';
let hasMoreVideos = false;
let isLoadingMore = false;
let sentinelObserver = null;

async function analyzeChannel() {
    const url = document.getElementById('channelUrl').value.trim();
    const dateFilter = document.getElementById('dateFilter').value;
    if (!url) { showAlert('Please enter a YouTube channel URL', 'error'); return; }

    document.getElementById('analyzeBtn').disabled = true;
    showProgress('analysisProgress');
    updateProgress('analysisProgress', 40, 'Fetching channel videos...');

    try {
        const res = await fetch('/api/analyze_channel', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ channel_url: url, date_filter: dateFilter })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Analysis failed');

        discoveredVideos = data.videos || [];
        currentContinuationToken = data.continuation_token || null;
        currentDateFilter = dateFilter;
        hasMoreVideos = data.has_more || false;

        hideProgress('analysisProgress');

        if (!discoveredVideos.length) { showAlert('No videos found', 'error'); return; }

        showAlert('Found videos!', 'success');
        populateVideoGrid(discoveredVideos);
        activateStep(2);
    } catch (e) {
        hideProgress('analysisProgress');
        showAlert('Error: ' + e.message, 'error');
    } finally {
        document.getElementById('analyzeBtn').disabled = false;
    }
}

function createVideoCard(v) {
    const card = document.createElement('div');
    card.className = 'video-card';
    card.id = 'card_' + v.videoId;
    card.onclick = function(e) { if (e.target.tagName !== 'INPUT') toggleVideoSelection(v.videoId); };
    card.innerHTML =
        '<div class="checkbox-container">' +
            '<input type="checkbox" id="cb_' + v.videoId + '" onchange="toggleVideoSelection(\'' + v.videoId + '\')">' +
        '</div>' +
        '<img src="' + v.thumbnail + '" alt="" class="video-thumbnail" onerror="this.style.display=\'none\'">' +
        '<div class="video-info">' +
            '<div class="video-title">' + escapeHtml(v.title) + '</div>' +
            '<div class="video-meta"><span>' + v.duration + '</span><span>' + v.views + '</span></div>' +
        '</div>';
    return card;
}

function appendVideoCards(videos) {
    const grid = document.getElementById('videoGrid');
    videos.forEach(function(v) { grid.appendChild(createVideoCard(v)); });
}

function populateVideoGrid(videos) {
    const grid = document.getElementById('videoGrid');
    grid.innerHTML = '';
    videos.forEach(function(v) { grid.appendChild(createVideoCard(v)); });

    var countDisplay = document.getElementById('videoCountDisplay');
    if (countDisplay) {
        countDisplay.textContent = hasMoreVideos
            ? 'Showing ' + videos.length + ' videos, scroll for more'
            : videos.length + ' video' + (videos.length !== 1 ? 's' : '');
    }

    setupInfiniteScroll();
}

function setupInfiniteScroll() {
    if (sentinelObserver) sentinelObserver.disconnect();

    var sentinel = document.getElementById('videoGridSentinel');
    if (!sentinel) return;

    sentinelObserver = new IntersectionObserver(function(entries) {
        if (entries[0].isIntersecting && hasMoreVideos && !isLoadingMore) {
            loadMoreVideos();
        }
    }, { rootMargin: '200px' });

    sentinelObserver.observe(sentinel);
}

async function loadMoreVideos() {
    if (isLoadingMore || !hasMoreVideos || !currentContinuationToken) return;

    isLoadingMore = true;
    var indicator = document.getElementById('loadMoreIndicator');
    if (indicator) indicator.style.display = 'flex';

    try {
        var res = await fetch('/api/load_more_videos', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                continuation_token: currentContinuationToken,
                date_filter: currentDateFilter,
            })
        });
        var data = await res.json();

        if (data.videos && data.videos.length > 0) {
            appendVideoCards(data.videos);
            discoveredVideos = discoveredVideos.concat(data.videos);
            currentContinuationToken = data.continuation_token || null;
            hasMoreVideos = data.has_more || false;

            var countDisplay = document.getElementById('videoCountDisplay');
            if (countDisplay) {
                countDisplay.textContent = hasMoreVideos
                    ? 'Showing ' + discoveredVideos.length + ' videos, scroll for more'
                    : discoveredVideos.length + ' video' + (discoveredVideos.length !== 1 ? 's' : '');
            }
        } else {
            hasMoreVideos = false;
        }

        if (!hasMoreVideos && sentinelObserver) sentinelObserver.disconnect();
    } catch (e) {
        console.error('Error loading more videos:', e);
    } finally {
        isLoadingMore = false;
        var indicator = document.getElementById('loadMoreIndicator');
        if (indicator) indicator.style.display = 'none';
    }
}

function toggleVideoSelection(id) {
    var cb = document.getElementById('cb_' + id);
    var card = document.getElementById('card_' + id);
    if (selectedVideos.has(id)) {
        selectedVideos.delete(id); card.classList.remove('selected'); cb.checked = false;
    } else {
        selectedVideos.add(id); card.classList.add('selected'); cb.checked = true;
    }
    updateSelectedCount();
}

function updateSelectedCount() {
    document.getElementById('selectedCount').textContent = selectedVideos.size;
    document.getElementById('extractBtn').disabled = selectedVideos.size === 0;
}

function selectAll() {
    discoveredVideos.forEach(function(v) {
        selectedVideos.add(v.videoId);
        var cb = document.getElementById('cb_' + v.videoId);
        var card = document.getElementById('card_' + v.videoId);
        if (cb) cb.checked = true;
        if (card) card.classList.add('selected');
    });
    updateSelectedCount();
}

function selectNone() {
    selectedVideos.clear();
    discoveredVideos.forEach(function(v) {
        var cb = document.getElementById('cb_' + v.videoId);
        var card = document.getElementById('card_' + v.videoId);
        if (cb) cb.checked = false;
        if (card) card.classList.remove('selected');
    });
    updateSelectedCount();
}

function selectTop(n) {
    selectNone();
    discoveredVideos.slice(0, n).forEach(function(v) {
        selectedVideos.add(v.videoId);
        var cb = document.getElementById('cb_' + v.videoId);
        var card = document.getElementById('card_' + v.videoId);
        if (cb) cb.checked = true;
        if (card) card.classList.add('selected');
    });
    updateSelectedCount();
}

async function extractTranscripts() {
    if (selectedVideos.size === 0) { showAlert('Select at least one video', 'error'); return; }

    var urls = discoveredVideos
        .filter(function(v) { return selectedVideos.has(v.videoId); })
        .map(function(v) { return v.url; });

    startExtractionStream(urls);
}

function startExtractionStream(urls) {
    var total = urls.length;
    extractedResults = [];
    var resultIndexByVideoId = {};

    document.getElementById('extractBtn').disabled = true;
    document.getElementById('retryFailedBtn') && (document.getElementById('retryFailedBtn').style.display = 'none');
    showProgress('extractionProgress');
    updateProgress('extractionProgress', 0, 'Connecting...');

    // Show results section early so cards stream in live
    activateStep(3);
    document.getElementById('resultsSection').style.display = 'block';
    document.getElementById('resultsContainer').innerHTML = '';
    document.getElementById('resultsTitle').textContent = 'Extracting 0/' + total + ' transcripts...';
    document.getElementById('summarizeAllBtn').style.display = 'none';

    var encodedUrls = encodeURIComponent(JSON.stringify(urls));
    var es = new EventSource('/api/extract_transcripts_stream?urls=' + encodedUrls);

    es.addEventListener('progress', function(e) {
        var d = JSON.parse(e.data);
        var pct = Math.round(((d.current - 1) / total) * 100);
        updateProgress('extractionProgress', pct, 'Processing ' + d.current + '/' + total + '...');
    });

    es.addEventListener('result', function(e) {
        var r = JSON.parse(e.data);
        var idx = extractedResults.length;
        extractedResults.push(r);
        resultIndexByVideoId[r.videoId] = idx;

        // Append card immediately
        var apiKey = document.getElementById('geminiApiKey').value.trim();
        appendResultCard(r, idx, apiKey);

        var succeeded = extractedResults.filter(function(x) { return x.success; }).length;
        document.getElementById('resultsTitle').textContent =
            'Extracting ' + extractedResults.length + '/' + total + ' transcripts (' + succeeded + ' succeeded)';
    });

    es.addEventListener('done', function(e) {
        es.close();
        var d = JSON.parse(e.data);
        hideProgress('extractionProgress');
        document.getElementById('extractBtn').disabled = false;
        document.getElementById('resultsTitle').textContent =
            'Extracted ' + d.succeeded + '/' + d.total + ' transcripts';

        var apiKey = document.getElementById('geminiApiKey').value.trim();
        if (apiKey && d.succeeded > 0) document.getElementById('summarizeAllBtn').style.display = 'inline-flex';

        showAlert('Done! ' + d.succeeded + ' of ' + d.total + ' transcripts extracted.', d.succeeded === d.total ? 'success' : 'info');

        // Show retry button if any failed
        if (d.failed > 0) showRetryFailedButton();
    });

    es.addEventListener('error', function() {
        // EventSource has no way to distinguish network drop from normal close;
        // only show error if we haven't received a 'done' yet
        if (!es.CLOSED && es.readyState === EventSource.CLOSED) return;
        es.close();
        hideProgress('extractionProgress');
        document.getElementById('extractBtn').disabled = false;
        showAlert('Stream connection interrupted. Try again or use the batch button.', 'error');
    });
}

function showRetryFailedButton() {
    var btn = document.getElementById('retryFailedBtn');
    if (!btn) {
        btn = document.createElement('button');
        btn.id = 'retryFailedBtn';
        btn.className = 'btn btn-small btn-outline';
        btn.innerHTML = '<svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.04"/></svg> Retry Failed';
        btn.onclick = retryFailed;
        document.getElementById('resultsActions') && document.getElementById('resultsActions').appendChild(btn);
        // Fallback: append near results header
        if (!document.getElementById('retryFailedBtn')) {
            document.querySelector('.results-actions').appendChild(btn);
        }
    }
    btn.style.display = 'inline-flex';
}

function retryFailed() {
    var failedUrls = extractedResults
        .filter(function(r) { return !r.success; })
        .map(function(r) { return 'https://www.youtube.com/watch?v=' + r.videoId; });

    if (!failedUrls.length) return;

    // Remove failed result cards from the DOM and from extractedResults
    extractedResults = extractedResults.filter(function(r, idx) {
        if (!r.success) {
            var card = document.getElementById('result_card_' + idx);
            if (card) card.remove();
            return false;
        }
        return true;
    });

    startExtractionStream(failedUrls);
}


function appendResultCard(r, idx, apiKey) {
    var container = document.getElementById('resultsContainer');
    var card = document.createElement('div');
    card.className = 'result-card';
    card.id = 'result_card_' + idx;
    var iconSvg = r.success
        ? '<svg class="result-icon success" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'
        : '<svg class="result-icon error" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>';
    var title = r.title || r.videoId || 'Unknown';
    var actions = '';
    if (r.success) {
        actions =
            '<button class="btn btn-small btn-outline" onclick="event.stopPropagation();toggleSection(\'transcript_' + idx + '\')"><svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>View</button>' +
            (apiKey ? '<button class="btn btn-small btn-success" id="sumBtn_' + idx + '" onclick="event.stopPropagation();summarizeSingle(' + idx + ')"><svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>Summarize</button>' : '') +
            '<button class="btn btn-small btn-primary" onclick="event.stopPropagation();downloadSingle(' + idx + ')"><svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Download</button>';
    } else {
        actions = '<span style="color:var(--color-error);font-size:0.8125rem">' + escapeHtml(r.error || 'Failed') + '</span>';
    }
    card.innerHTML =
        '<div class="result-card-header" onclick="toggleSection(\'transcript_' + idx + '\')">' +
            '<h4>' + iconSvg + ' ' + escapeHtml(title) + '</h4>' +
            '<div class="result-actions">' + actions + '</div>' +
        '</div>' +
        (r.success ?
            '<div class="transcript-content" id="transcript_' + idx + '"><pre>' + escapeHtml(r.transcript) + '</pre></div>' +
            '<div class="summary-content" id="summary_' + idx + '"><div class="summary-text" id="summaryText_' + idx + '"></div></div>'
        : '');
    container.appendChild(card);
}

function showResults() {
    var section = document.getElementById('resultsSection');
    var apiKey = document.getElementById('geminiApiKey').value.trim();
    var success = extractedResults.filter(function(r) { return r.success; }).length;

    document.getElementById('resultsTitle').textContent =
        'Extracted ' + success + '/' + extractedResults.length + ' transcripts';

    if (apiKey && success > 0) document.getElementById('summarizeAllBtn').style.display = 'inline-flex';
    else document.getElementById('summarizeAllBtn').style.display = 'none';

    document.getElementById('resultsContainer').innerHTML = '';
    extractedResults.forEach(function(r, idx) { appendResultCard(r, idx, apiKey); });

    section.style.display = 'block';
    showAlert('Extraction complete! ' + success + ' of ' + extractedResults.length + ' transcripts extracted.', 'success');
}

function toggleSection(id) {
    var el = document.getElementById(id);
    if (el) el.style.display = el.style.display === 'block' ? 'none' : 'block';
}

async function summarizeSingle(idx) {
    var apiKey = document.getElementById('geminiApiKey').value.trim();
    if (!apiKey) { showAlert('Enter a Gemini API key to use summarization', 'error'); return; }
    var r = extractedResults[idx];
    if (!r || !r.success) return;

    var btn = document.getElementById('sumBtn_' + idx);
    var sumDiv = document.getElementById('summary_' + idx);
    var sumText = document.getElementById('summaryText_' + idx);

    btn.disabled = true;
    btn.innerHTML = '<span class="loading-spinner"></span>Summarizing...';
    sumDiv.style.display = 'block';
    sumText.innerHTML = '<span class="loading-spinner"></span> Generating summary...';

    try {
        var res = await fetch('/api/summarize', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ api_key: apiKey, transcript: r.transcript, title: r.title || r.videoId })
        });
        var data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Summarization failed');
        sumText.innerHTML = renderMarkdown(data.summary);
        btn.textContent = 'Summarized';
    } catch (e) {
        sumText.innerHTML = '<span style="color:#e74c3c">Error: ' + escapeHtml(e.message) + '</span>';
        btn.disabled = false;
        btn.textContent = 'Retry';
    }
}

async function summarizeAll() {
    for (var i = 0; i < extractedResults.length; i++) {
        if (extractedResults[i].success) await summarizeSingle(i);
    }
}

function downloadSingle(idx) {
    var r = extractedResults[idx];
    if (!r || !r.success) return;
    var fmt = document.getElementById('outputFormat').value;
    var name = sanitizeFilename(r.title || r.videoId);

    if (fmt === 'txt' || fmt === 'both') downloadText(name + '.txt', r.transcript);
    if (fmt === 'md' || fmt === 'both') {
        var md = '# ' + (r.title || r.videoId) + '\n\n' +
            '**Language:** ' + (r.language || 'unknown') + '  \n' +
            '**Auto-generated:** ' + (r.isGenerated != null ? r.isGenerated : 'unknown') + '  \n\n' +
            '## Transcript\n\n' + r.transcript;
        downloadText(name + '.md', md);
    }
}

async function downloadAllZip() {
    var fmt = document.getElementById('outputFormat').value;
    var zip = new JSZip();

    extractedResults.filter(function(r) { return r.success; }).forEach(function(r) {
        var name = sanitizeFilename(r.title || r.videoId);
        if (fmt === 'txt' || fmt === 'both') zip.file(name + '.txt', r.transcript);
        if (fmt === 'md' || fmt === 'both') {
            var md = '# ' + (r.title || r.videoId) + '\n\n' +
                '**Language:** ' + (r.language || 'unknown') + '  \n' +
                '**Auto-generated:** ' + (r.isGenerated != null ? r.isGenerated : 'unknown') + '  \n\n' +
                '## Transcript\n\n' + r.transcript;
            zip.file(name + '.md', md);
        }
    });

    var blob = await zip.generateAsync({ type: 'blob' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'transcripts.zip';
    a.click();
    URL.revokeObjectURL(a.href);
}

function downloadText(filename, content) {
    var blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    URL.revokeObjectURL(a.href);
}

function showProgress(id) { document.getElementById(id).style.display = 'block'; }
function hideProgress(id) { document.getElementById(id).style.display = 'none'; }

function updateProgress(id, pct, msg) {
    document.getElementById(id + 'Fill').style.width = pct + '%';
    document.getElementById(id + 'Text').textContent = msg;
}

function activateStep(n) {
    document.querySelectorAll('.step').forEach(function(s) { s.classList.remove('active'); });
    document.getElementById('step' + n).classList.add('active');
    document.getElementById('step' + n).scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function showAlert(msg, type) {
    document.querySelectorAll('.main-content > .alert').forEach(function(a) { a.remove(); });
    var el = document.createElement('div');
    el.className = 'alert alert-' + type;
    el.textContent = msg;
    var mc = document.querySelector('.main-content');
    mc.insertBefore(el, mc.firstChild);
    if (type !== 'error') setTimeout(function() { if (el.parentNode) el.remove(); }, 5000);
}

function escapeHtml(t) {
    var d = document.createElement('div');
    d.textContent = t;
    return d.innerHTML;
}

function sanitizeFilename(n) {
    return n.replace(/[^a-zA-Z0-9_\- ]/g, '').replace(/\s+/g, '_').substring(0, 100) || 'transcript';
}

function renderMarkdown(text) {
    return text
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h3>$1</h3>')
        .replace(/^# (.+)$/gm, '<h2>$1</h2>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/^\- (.+)$/gm, '<li>$1</li>')
        .replace(/^\d+\.\s+(.+)$/gm, '<li>$1</li>')
        .replace(/\n\n/g, '<br><br>')
        .replace(/\n/g, '<br>');
}
</script>
