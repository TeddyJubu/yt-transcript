<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Channel Analyzer Configuration</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #EAECE1; 
            color: #1A1A1A; 
        }

        select {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            background-color: transparent;
        }
        
        select option {
            background-color: #EAECE1;
            color: #1A1A1A;
        }

        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 30px #EAECE1 inset !important;
            -webkit-text-fill-color: #1A1A1A !important;
        }

        /* Loading Spinner */
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #1A1A1A;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Custom Scrollbar for Pre tags */
        pre::-webkit-scrollbar { width: 6px; }
        pre::-webkit-scrollbar-track { background: transparent; }
        pre::-webkit-scrollbar-thumb { background: rgba(26,26,26,0.2); border-radius: 3px; }

        .hidden-step { display: none !important; }
    </style>
</head>
<body class="w-screen min-h-screen flex items-center justify-center p-6 sm:p-12 overflow-x-hidden antialiased selection:bg-[#1A1A1A] selection:text-[#EAECE1]">

    <main class="w-full max-w-[720px] bg-[#EAECE1] border border-[#1A1A1A] rounded-[2.5rem] p-8 sm:p-14 relative shadow-sm transition-all duration-300">
        
        <!-- Header / Tracker -->
        <header class="flex items-center justify-between mb-12">
            <div class="flex items-center gap-3">
                <span class="text-[11px] font-semibold uppercase tracking-[0.2em] text-[#1A1A1A]" id="stepTrackerText">Step 1 of 3</span>
            </div>
            
            <div class="flex gap-1.5" id="stepDots">
                <div class="w-1.5 h-1.5 rounded-full bg-[#1A1A1A]" id="dot1"></div>
                <div class="w-1.5 h-1.5 rounded-full border border-[#1A1A1A]" id="dot2"></div>
                <div class="w-1.5 h-1.5 rounded-full border border-[#1A1A1A]" id="dot3"></div>
            </div>
        </header>

        <!-- Dynamic Title -->
        <h1 class="text-4xl sm:text-5xl font-light tracking-tight mb-12 text-[#1A1A1A]" id="mainTitle">
            Channel &amp; Settings
        </h1>

        <!-- Global Alerts Container -->
        <div id="alertsContainer" class="mb-8 space-y-2 empty:hidden"></div>

        <!-- Step 1: Settings -->
        <form class="space-y-8" id="step1">
            <div class="space-y-3">
                <label for="channelUrl" class="block text-[11px] font-semibold uppercase tracking-[0.15em] ml-6 text-[#1A1A1A]">
                    YouTube Channel URL
                </label>
                <div class="relative">
                    <input type="url" id="channelUrl" placeholder="https://youtube.com/@..." class="w-full bg-transparent border border-[#1A1A1A] rounded-full px-6 py-4 outline-none focus:ring-1 focus:ring-[#1A1A1A] placeholder:text-[#1A1A1A]/40 transition-shadow text-base text-[#1A1A1A]">
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-8">
                <div class="space-y-3">
                    <label for="dateFilter" class="block text-[11px] font-semibold uppercase tracking-[0.15em] ml-6 text-[#1A1A1A]">
                        Date Range
                    </label>
                    <div class="relative">
                        <select id="dateFilter" class="w-full bg-transparent border border-[#1A1A1A] rounded-full px-6 py-4 outline-none focus:ring-1 focus:ring-[#1A1A1A] cursor-pointer text-base pr-12 text-[#1A1A1A]">
                            <option value="this_month">This month</option>
                            <option value="last_3_months" selected>Last 3 months</option>
                            <option value="last_6_months">Last 6 months</option>
                            <option value="this_year">This year</option>
                            <option value="last_year">Last year</option>
                            <option value="all_time">All time</option>
                        </select>
                        <div class="absolute right-6 top-1/2 -translate-y-1/2 pointer-events-none text-[#1A1A1A]">
                            <svg width="14" height="8" viewBox="0 0 14 8" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 1L7 7L13 1"></path>
                            </svg>
                        </div>
                    </div>
                </div>

                <div class="space-y-3">
                    <label for="outputFormat" class="block text-[11px] font-semibold uppercase tracking-[0.15em] ml-6 text-[#1A1A1A]">
                        Output Format
                    </label>
                    <div class="relative">
                        <select id="outputFormat" class="w-full bg-transparent border border-[#1A1A1A] rounded-full px-6 py-4 outline-none focus:ring-1 focus:ring-[#1A1A1A] cursor-pointer text-base pr-12 text-[#1A1A1A]">
                            <option value="txt">Text (.txt)</option>
                            <option value="md">Markdown (.md)</option>
                            <option value="both" selected>Both</option>
                        </select>
                        <div class="absolute right-6 top-1/2 -translate-y-1/2 pointer-events-none text-[#1A1A1A]">
                            <svg width="14" height="8" viewBox="0 0 14 8" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 1L7 7L13 1"></path>
                            </svg>
                        </div>
                    </div>
                </div>
            </div>

            <div class="space-y-3 pt-2">
                <label for="geminiApiKey" class="block text-[11px] font-semibold uppercase tracking-[0.15em] ml-6 text-[#1A1A1A]">
                    Gemini API Key
                </label>
                <input type="password" id="geminiApiKey" placeholder="AIzaSy..." class="w-full bg-transparent border border-[#1A1A1A] rounded-full px-6 py-4 outline-none focus:ring-1 focus:ring-[#1A1A1A] placeholder:text-[#1A1A1A]/40 transition-shadow text-base font-mono text-[#1A1A1A]">
                <p class="text-[13px] ml-6 text-[#1A1A1A]/70 mt-2 leading-relaxed">
                    Optional. Enables AI-powered video summaries and topical insights generation.
                </p>
            </div>

            <hr class="border-t border-[#1A1A1A]/20 my-10">

            <button type="button" id="analyzeBtn" onclick="analyzeChannel()" class="w-full bg-[#1A1A1A] text-[#EAECE1] rounded-full py-5 px-8 flex justify-between items-center group hover:bg-opacity-90 transition-all duration-300 border border-[#1A1A1A]">
                <span class="text-[13px] font-semibold uppercase tracking-[0.15em] ml-2">Analyze Channel</span>
                <div class="w-8 h-8 rounded-full border border-[#EAECE1]/30 flex items-center justify-center group-hover:translate-x-1 transition-transform duration-300">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </div>
            </button>

            <!-- Loading Progress -->
            <div id="analysisProgress" class="hidden mt-6 space-y-2">
                <div class="w-full h-1.5 bg-[#1A1A1A]/10 rounded-full overflow-hidden">
                    <div id="analysisProgressFill" class="h-full bg-[#1A1A1A] w-0 transition-all duration-300"></div>
                </div>
                <p id="analysisProgressText" class="text-center text-[11px] font-mono uppercase tracking-wider text-[#1A1A1A]/60">Analyzing channel...</p>
            </div>
        </form>

        <!-- Step 2: Select Videos -->
        <div id="step2" class="hidden-step space-y-8">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 border-b border-[#1A1A1A]/10 pb-6">
                <div class="flex gap-3 flex-wrap">
                    <button class="bg-transparent border border-[#1A1A1A] text-[#1A1A1A] rounded-full px-5 py-2 text-[11px] font-semibold uppercase tracking-[0.1em] hover:bg-[#1A1A1A]/5 transition-colors" onclick="selectAll()">Select All</button>
                    <button class="bg-transparent border border-[#1A1A1A] text-[#1A1A1A] rounded-full px-5 py-2 text-[11px] font-semibold uppercase tracking-[0.1em] hover:bg-[#1A1A1A]/5 transition-colors" onclick="selectNone()">None</button>
                    <button class="bg-transparent border border-[#1A1A1A] text-[#1A1A1A] rounded-full px-5 py-2 text-[11px] font-semibold uppercase tracking-[0.1em] hover:bg-[#1A1A1A]/5 transition-colors" onclick="selectTop(10)">Top 10</button>
                </div>
                <span id="videoCountDisplay" class="text-[11px] font-mono text-[#1A1A1A]/60"></span>
            </div>

            <div id="videoGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 max-h-[50vh] overflow-y-auto pr-2">
                <!-- Video Cards populated here -->
            </div>
            
            <div id="videoGridSentinel" class="h-1"></div>
            
            <div id="loadMoreIndicator" class="hidden justify-center items-center py-4 gap-3">
                <div class="loading-spinner border-[#1A1A1A]"></div>
                <span class="text-[11px] font-mono text-[#1A1A1A]/60">Loading more videos...</span>
            </div>

            <hr class="border-t border-[#1A1A1A]/20 my-10">

            <button type="button" id="extractBtn" disabled onclick="extractTranscripts()" class="w-full bg-[#1A1A1A] text-[#EAECE1] rounded-full py-5 px-8 flex justify-between items-center group hover:bg-opacity-90 disabled:opacity-50 disabled:cursor-not-allowed transition-all duration-300 border border-[#1A1A1A]">
                <span class="text-[13px] font-semibold uppercase tracking-[0.15em] ml-2">Extract Transcripts (<span id="selectedCount">0</span>)</span>
                <div class="w-8 h-8 rounded-full border border-[#EAECE1]/30 flex items-center justify-center group-hover:translate-x-1 transition-transform duration-300">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <polyline points="19 12 12 19 5 12"></polyline>
                    </svg>
                </div>
            </button>

            <!-- Loading Progress -->
            <div id="extractionProgress" class="hidden mt-6 space-y-2">
                <div class="w-full h-1.5 bg-[#1A1A1A]/10 rounded-full overflow-hidden">
                    <div id="extractionProgressFill" class="h-full bg-[#1A1A1A] w-0 transition-all duration-300"></div>
                </div>
                <p id="extractionProgressText" class="text-center text-[11px] font-mono uppercase tracking-wider text-[#1A1A1A]/60">Extracting transcripts...</p>
            </div>
        </div>

        <!-- Step 3: Results -->
        <div id="step3" class="hidden-step space-y-8">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 border-b border-[#1A1A1A]/10 pb-6" id="resultsActions">
                <span class="text-[11px] font-mono text-[#1A1A1A]/60" id="resultsTitle">Extraction Complete</span>
                <div class="flex gap-3 flex-wrap">
                    <button id="retryFailedBtn" class="bg-transparent border border-[#1A1A1A] text-[#1A1A1A] rounded-full px-5 py-2 text-[11px] font-semibold uppercase tracking-[0.1em] hover:bg-[#1A1A1A]/5 transition-colors hidden" onclick="retryFailed()">Retry Failed</button>
                    <button id="summarizeAllBtn" class="bg-[#1A1A1A]/10 border border-[#1A1A1A]/20 text-[#1A1A1A] rounded-full px-5 py-2 text-[11px] font-semibold uppercase tracking-[0.1em] hover:bg-[#1A1A1A]/20 transition-colors hidden" onclick="summarizeAll()">Summarize All</button>
                    <button class="bg-[#1A1A1A] border border-[#1A1A1A] text-[#EAECE1] rounded-full px-5 py-2 text-[11px] font-semibold uppercase tracking-[0.1em] hover:bg-opacity-90 transition-colors" onclick="downloadAllZip()">Download ALL ZIP</button>
                </div>
            </div>

            <div id="resultsContainer" class="space-y-4 max-h-[60vh] overflow-y-auto pr-2">
                <!-- Results Cards populated here -->
            </div>
            
            <div class="flex justify-center mt-8">
                <button type="button" onclick="resetApp()" class="bg-transparent border border-[#1A1A1A] text-[#1A1A1A] rounded-full py-4 px-8 text-[11px] font-semibold uppercase tracking-[0.1em] hover:bg-[#1A1A1A]/5 transition-colors">Start Over</button>
            </div>
        </div>

    </main>

<script>
let discoveredVideos = [];
let selectedVideos = new Set();
let extractedResults = [];

// Infinite scroll state
let currentContinuationToken = null;
let currentDateFilter = 'all_time';
let hasMoreVideos = false;
let isLoadingMore = false;
let sentinelObserver = null;

function resetApp() {
    discoveredVideos = [];
    selectedVideos.clear();
    extractedResults = [];
    document.getElementById('channelUrl').value = '';
    document.getElementById('geminiApiKey').value = '';
    document.getElementById('videoGrid').innerHTML = '';
    document.getElementById('resultsContainer').innerHTML = '';
    updateSelectedCount();
    activateStep(1);
}

async function analyzeChannel() {
    const url = document.getElementById('channelUrl').value.trim();
    const dateFilter = document.getElementById('dateFilter').value;
    if (!url) { showAlert('Please enter a YouTube channel URL', 'error'); return; }

    document.getElementById('analyzeBtn').disabled = true;
    showProgress('analysisProgress');
    updateProgress('analysisProgress', 40, 'Fetching channel videos...');

    try {
        const res = await fetch('/api/analyze_channel', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ channel_url: url, date_filter: dateFilter })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Analysis failed');

        discoveredVideos = data.videos || [];
        currentContinuationToken = data.continuation_token || null;
        currentDateFilter = dateFilter;
        hasMoreVideos = data.has_more || false;

        hideProgress('analysisProgress');

        if (!discoveredVideos.length) { showAlert('No videos found', 'error'); return; }

        populateVideoGrid(discoveredVideos);
        activateStep(2);
    } catch (e) {
        hideProgress('analysisProgress');
        showAlert('Error: ' + e.message, 'error');
    } finally {
        document.getElementById('analyzeBtn').disabled = false;
    }
}

function createVideoCard(v) {
    const card = document.createElement('div');
    card.className = 'group relative bg-[#EAECE1] border border-[#1A1A1A]/20 rounded-2xl overflow-hidden cursor-pointer transition-all hover:border-[#1A1A1A]';
    card.id = 'card_' + v.videoId;
    card.onclick = function(e) { if (e.target.tagName !== 'INPUT') toggleVideoSelection(v.videoId); };
    card.innerHTML =
        '<div class="absolute top-3 right-3 z-10 w-6 h-6 rounded-full border border-[#1A1A1A]/30 bg-white/80 backdrop-blur flex items-center justify-center transition-colors">' +
            '<input type="checkbox" id="cb_' + v.videoId + '" onchange="toggleVideoSelection(\'' + v.videoId + '\')" class="opacity-0 absolute inset-0 cursor-pointer w-full h-full">' +
            '<div class="w-2.5 h-2.5 rounded-full pointer-events-none transition-colors" id="indicator_' + v.videoId + '"></div>' +
        '</div>' +
        '<div class="w-full h-32 bg-[#1A1A1A]/5 relative overflow-hidden">' +
            '<img src="' + v.thumbnail + '" alt="" class="w-full h-full object-cover grayscale opacity-80 group-hover:grayscale-0 group-hover:opacity-100 transition-all duration-500" onerror="this.style.display=\'none\'">' +
        '</div>' +
        '<div class="p-4">' +
            '<div class="font-semibold text-[13px] leading-snug text-[#1A1A1A] mb-2 line-clamp-2">' + escapeHtml(v.title) + '</div>' +
            '<div class="text-[10px] font-mono text-[#1A1A1A]/50 flex justify-between">' +
                '<span>' + v.duration + '</span><span>' + v.views + '</span>' +
            '</div>' +
        '</div>';
    return card;
}

function appendVideoCards(videos) {
    const grid = document.getElementById('videoGrid');
    videos.forEach(function(v) { grid.appendChild(createVideoCard(v)); });
}

function populateVideoGrid(videos) {
    const grid = document.getElementById('videoGrid');
    grid.innerHTML = '';
    videos.forEach(function(v) { grid.appendChild(createVideoCard(v)); });

    var countDisplay = document.getElementById('videoCountDisplay');
    if (countDisplay) {
        countDisplay.textContent = hasMoreVideos
            ? 'Showing ' + videos.length + ' videos, scroll for more'
            : videos.length + ' video' + (videos.length !== 1 ? 's' : '');
    }

    setupInfiniteScroll();
}

function setupInfiniteScroll() {
    if (sentinelObserver) sentinelObserver.disconnect();

    var sentinel = document.getElementById('videoGridSentinel');
    if (!sentinel) return;

    sentinelObserver = new IntersectionObserver(function(entries) {
        if (entries[0].isIntersecting && hasMoreVideos && !isLoadingMore) {
            loadMoreVideos();
        }
    }, { rootMargin: '200px' });

    sentinelObserver.observe(sentinel);
}

async function loadMoreVideos() {
    if (isLoadingMore || !hasMoreVideos || !currentContinuationToken) return;

    isLoadingMore = true;
    var indicator = document.getElementById('loadMoreIndicator');
    if (indicator) indicator.classList.remove('hidden');
    if (indicator) indicator.classList.add('flex');

    try {
        var res = await fetch('/api/load_more_videos', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                continuation_token: currentContinuationToken,
                date_filter: currentDateFilter,
            })
        });
        var data = await res.json();

        if (data.videos && data.videos.length > 0) {
            appendVideoCards(data.videos);
            discoveredVideos = discoveredVideos.concat(data.videos);
            currentContinuationToken = data.continuation_token || null;
            hasMoreVideos = data.has_more || false;

            var countDisplay = document.getElementById('videoCountDisplay');
            if (countDisplay) {
                countDisplay.textContent = hasMoreVideos
                    ? 'Showing ' + discoveredVideos.length + ' videos, scroll for more'
                    : discoveredVideos.length + ' video' + (discoveredVideos.length !== 1 ? 's' : '');
            }
        } else {
            hasMoreVideos = false;
        }

        if (!hasMoreVideos && sentinelObserver) sentinelObserver.disconnect();
    } catch (e) {
        console.error('Error loading more videos:', e);
    } finally {
        isLoadingMore = false;
        var indicator = document.getElementById('loadMoreIndicator');
        if (indicator) indicator.classList.add('hidden');
        if (indicator) indicator.classList.remove('flex');
    }
}

function toggleVideoSelection(id) {
    var cb = document.getElementById('cb_' + id);
    var card = document.getElementById('card_' + id);
    var indicator = document.getElementById('indicator_' + id);
    
    if (selectedVideos.has(id)) {
        selectedVideos.delete(id); 
        card.classList.remove('border-[#1A1A1A]', 'bg-white/50');
        indicator.classList.remove('bg-[#1A1A1A]');
        cb.checked = false;
    } else {
        selectedVideos.add(id); 
        card.classList.add('border-[#1A1A1A]', 'bg-white/50');
        indicator.classList.add('bg-[#1A1A1A]');
        cb.checked = true;
    }
    updateSelectedCount();
}

function updateSelectedCount() {
    document.getElementById('selectedCount').textContent = selectedVideos.size;
    document.getElementById('extractBtn').disabled = selectedVideos.size === 0;
}

function selectAll() {
    discoveredVideos.forEach(function(v) {
        if(!selectedVideos.has(v.videoId)) toggleVideoSelection(v.videoId);
    });
}

function selectNone() {
    var copy = Array.from(selectedVideos);
    copy.forEach(function(id) {
        toggleVideoSelection(id);
    });
}

function selectTop(n) {
    selectNone();
    discoveredVideos.slice(0, n).forEach(function(v) {
        if(!selectedVideos.has(v.videoId)) toggleVideoSelection(v.videoId);
    });
}

async function extractTranscripts() {
    if (selectedVideos.size === 0) { showAlert('Select at least one video', 'error'); return; }

    var urls = discoveredVideos
        .filter(function(v) { return selectedVideos.has(v.videoId); })
        .map(function(v) { return v.url; });

    startExtractionStream(urls);
}

function startExtractionStream(urls) {
    var total = urls.length;
    extractedResults = [];
    var resultIndexByVideoId = {};

    document.getElementById('extractBtn').disabled = true;
    document.getElementById('retryFailedBtn').classList.add('hidden');
    showProgress('extractionProgress');
    updateProgress('extractionProgress', 0, 'Connecting...');

    activateStep(3);
    document.getElementById('resultsContainer').innerHTML = '';
    document.getElementById('resultsTitle').textContent = 'Extracting 0/' + total;
    document.getElementById('summarizeAllBtn').classList.add('hidden');

    var encodedUrls = encodeURIComponent(JSON.stringify(urls));
    var es = new EventSource('/api/extract_transcripts_stream?urls=' + encodedUrls);

    es.addEventListener('progress', function(e) {
        var d = JSON.parse(e.data);
        var pct = Math.round(((d.current - 1) / total) * 100);
        updateProgress('extractionProgress', pct, 'Transcribing ' + d.current + '/' + total + '...');
    });

    es.addEventListener('result', function(e) {
        var r = JSON.parse(e.data);
        var idx = extractedResults.length;
        extractedResults.push(r);
        resultIndexByVideoId[r.videoId] = idx;

        var apiKey = document.getElementById('geminiApiKey').value.trim();
        appendResultCard(r, idx, apiKey);

        var succeeded = extractedResults.filter(function(x) { return x.success; }).length;
        document.getElementById('resultsTitle').textContent =
            'Success: ' + succeeded + ' / ' + total;
    });

    es.addEventListener('done', function(e) {
        es.close();
        var d = JSON.parse(e.data);
        hideProgress('extractionProgress');
        document.getElementById('extractBtn').disabled = false;
        
        var apiKey = document.getElementById('geminiApiKey').value.trim();
        if (apiKey && d.succeeded > 0) document.getElementById('summarizeAllBtn').classList.remove('hidden');

        if (d.failed > 0) {
            document.getElementById('retryFailedBtn').classList.remove('hidden');
        }
    });

    es.addEventListener('error', function() {
        if (!es.CLOSED && es.readyState === EventSource.CLOSED) return;
        es.close();
        hideProgress('extractionProgress');
        document.getElementById('extractBtn').disabled = false;
        showAlert('Stream mapping failed. Retry.', 'error');
    });
}

function retryFailed() {
    var failedUrls = extractedResults
        .filter(function(r) { return !r.success; })
        .map(function(r) { return 'https://www.youtube.com/watch?v=' + r.videoId; });

    if (!failedUrls.length) return;

    extractedResults = extractedResults.filter(function(r, idx) {
        if (!r.success) {
            var card = document.getElementById('result_card_' + idx);
            if (card) card.remove();
            return false;
        }
        return true;
    });

    startExtractionStream(failedUrls);
}


function appendResultCard(r, idx, apiKey) {
    var container = document.getElementById('resultsContainer');
    var card = document.createElement('div');
    card.className = 'border border-[#1A1A1A]/20 rounded-2xl bg-white/40 overflow-hidden';
    card.id = 'result_card_' + idx;
    
    var iconSvg = r.success
        ? '<div class="w-6 h-6 rounded-full bg-[#1A1A1A] text-[#EAECE1] flex items-center justify-center shrink-0"><svg viewBox="0 0 24 24" class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>'
        : '<div class="w-6 h-6 rounded-full border border-[#1A1A1A] text-[#1A1A1A] flex items-center justify-center shrink-0"><svg viewBox="0 0 24 24" class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div>';
    
    var title = r.title || r.videoId || 'Unknown';
    
    var actions = '';
    if (r.success) {
        actions =
            '<div class="flex gap-2 shrink-0">' +
                '<button class="text-[10px] font-semibold uppercase tracking-wider text-[#1A1A1A] hover:bg-[#1A1A1A]/10 px-3 py-1.5 rounded-full transition-colors" onclick="event.stopPropagation();toggleSection(\'transcript_' + idx + '\')">View</button>' +
                (apiKey ? '<button class="text-[10px] font-semibold uppercase tracking-wider text-[#1A1A1A] hover:bg-[#1A1A1A]/10 px-3 py-1.5 rounded-full transition-colors" id="sumBtn_' + idx + '" onclick="event.stopPropagation();summarizeSingle(' + idx + ')">Summarize</button>' : '') +
                '<button class="text-[10px] font-semibold uppercase tracking-wider text-[#1A1A1A] hover:bg-[#1A1A1A]/10 px-3 py-1.5 rounded-full transition-colors" onclick="event.stopPropagation();downloadSingle(' + idx + ')">Save</button>' +
            '</div>';
    } else {
        actions = '<span class="text-[11px] text-[#1A1A1A]/50 font-mono px-3">' + escapeHtml(r.error || 'Failed') + '</span>';
    }
    
    card.innerHTML =
        '<div class="flex items-center justify-between p-4 cursor-pointer hover:bg-white/60 transition-colors" onclick="toggleSection(\'transcript_' + idx + '\')">' +
            '<div class="flex items-center gap-3 overflow-hidden mr-4">' + iconSvg + '<span class="text-sm font-medium text-[#1A1A1A] truncate">' + escapeHtml(title) + '</span></div>' +
            actions +
        '</div>' +
        (r.success ?
            '<div class="hidden-step" id="transcript_' + idx + '"><div class="p-4 border-t border-[#1A1A1A]/10 bg-[#EAECE1]/30"><pre class="text-[11px] font-mono leading-relaxed text-[#1A1A1A]/80 whitespace-pre-wrap max-h-[300px] overflow-y-auto w-full">' + escapeHtml(r.transcript) + '</pre></div></div>' +
            '<div class="hidden-step" id="summary_' + idx + '"><div class="p-4 border-t border-[#1A1A1A]/10 bg-white"><div class="text-[13px] leading-relaxed text-[#1A1A1A] prose prose-sm max-w-none" id="summaryText_' + idx + '"></div></div></div>'
        : '');
    container.appendChild(card);
}

function toggleSection(id) {
    var el = document.getElementById(id);
    if (el) {
        if (el.classList.contains('hidden-step')) {
            el.classList.remove('hidden-step');
        } else {
            el.classList.add('hidden-step');
        }
    }
}

async function summarizeSingle(idx) {
    var apiKey = document.getElementById('geminiApiKey').value.trim();
    if (!apiKey) { showAlert('Enter a Gemini API key', 'error'); return; }
    var r = extractedResults[idx];
    if (!r || !r.success) return;

    var btn = document.getElementById('sumBtn_' + idx);
    var sumDiv = document.getElementById('summary_' + idx);
    var sumText = document.getElementById('summaryText_' + idx);

    btn.disabled = true;
    btn.innerHTML = 'Wait...';
    sumDiv.classList.remove('hidden-step');
    sumText.innerHTML = '<div class="flex items-center gap-2"><div class="loading-spinner"></div> <span class="text-[11px] font-mono">Generating Insight</span></div>';

    try {
        var res = await fetch('/api/summarize', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ api_key: apiKey, transcript: r.transcript, title: r.title || r.videoId })
        });
        var data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Summarization failed');
        sumText.innerHTML = renderMarkdown(data.summary);
        btn.textContent = 'Done';
    } catch (e) {
        sumText.innerHTML = '<span class="text-[#1A1A1A]/50 font-mono">Failed: ' + escapeHtml(e.message) + '</span>';
        btn.disabled = false;
        btn.textContent = 'Retry';
    }
}

async function summarizeAll() {
    for (var i = 0; i < extractedResults.length; i++) {
        if (extractedResults[i].success) await summarizeSingle(i);
    }
}

function downloadSingle(idx) {
    var r = extractedResults[idx];
    if (!r || !r.success) return;
    var fmt = document.getElementById('outputFormat').value;
    var name = sanitizeFilename(r.title || r.videoId);

    if (fmt === 'txt' || fmt === 'both') downloadText(name + '.txt', r.transcript);
    if (fmt === 'md' || fmt === 'both') {
        var md = '# ' + (r.title || r.videoId) + '\n\n' +
            '**Language:** ' + (r.language || 'unknown') + '  \n' +
            '**Auto-generated:** ' + (r.isGenerated != null ? r.isGenerated : 'unknown') + '  \n\n' +
            '## Transcript\n\n' + r.transcript;
        downloadText(name + '.md', md);
    }
}

async function downloadAllZip() {
    var fmt = document.getElementById('outputFormat').value;
    var zip = new JSZip();

    extractedResults.filter(function(r) { return r.success; }).forEach(function(r) {
        var name = sanitizeFilename(r.title || r.videoId);
        if (fmt === 'txt' || fmt === 'both') zip.file(name + '.txt', r.transcript);
        if (fmt === 'md' || fmt === 'both') {
            var md = '# ' + (r.title || r.videoId) + '\n\n' +
                '**Language:** ' + (r.language || 'unknown') + '  \n' +
                '**Auto-generated:** ' + (r.isGenerated != null ? r.isGenerated : 'unknown') + '  \n\n' +
                '## Transcript\n\n' + r.transcript;
            zip.file(name + '.md', md);
        }
    });

    var blob = await zip.generateAsync({ type: 'blob' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'transcripts.zip';
    a.click();
    URL.revokeObjectURL(a.href);
}

function downloadText(filename, content) {
    var blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    URL.revokeObjectURL(a.href);
}

function showProgress(id) { document.getElementById(id).classList.remove('hidden'); }
function hideProgress(id) { document.getElementById(id).classList.add('hidden'); }

function updateProgress(id, pct, msg) {
    document.getElementById(id + 'Fill').style.width = pct + '%';
    document.getElementById(id + 'Text').textContent = msg;
}

function activateStep(n) {
    document.getElementById('step1').classList.add('hidden-step');
    document.getElementById('step2').classList.add('hidden-step');
    document.getElementById('step3').classList.add('hidden-step');
    
    document.getElementById('step' + n).classList.remove('hidden-step');
    
    // Update header
    var titles = ["Channel & Settings", "Video Selection", "Extraction Results"];
    document.getElementById('mainTitle').textContent = titles[n-1];
    document.getElementById('stepTrackerText').textContent = "Step " + n + " of 3";
    
    // Update Dots
    for(var i=1; i<=3; i++) {
        var dot = document.getElementById('dot' + i);
        if (i === n) {
            dot.className = "w-1.5 h-1.5 rounded-full bg-[#1A1A1A]";
        } else if (i < n) {
            dot.className = "w-1.5 h-1.5 rounded-full bg-[#1A1A1A]/30";
        } else {
            dot.className = "w-1.5 h-1.5 rounded-full border border-[#1A1A1A]";
        }
    }
}

function showAlert(msg, type) {
    var container = document.getElementById('alertsContainer');
    var el = document.createElement('div');
    var border = type === 'error' ? 'border-[#1A1A1A] bg-white text-[#1A1A1A]' : 'border-[#1A1A1A]/20 bg-[#1A1A1A]/5 text-[#1A1A1A]';
    el.className = 'px-4 py-3 rounded-xl border flex items-center gap-3 text-sm ' + border;
    el.innerHTML = '<span class="font-mono text-[11px] uppercase tracking-wider opacity-70">' + type + '</span> <span>' + escapeHtml(msg) + '</span>';
    
    container.prepend(el);
    setTimeout(function() { if (el.parentNode) el.remove(); }, type === 'error' ? 8000 : 4000);
}

function escapeHtml(t) {
    var d = document.createElement('div');
    d.textContent = t;
    return d.innerHTML;
}

function sanitizeFilename(n) {
    return n.replace(/[^a-zA-Z0-9_\- ]/g, '').replace(/\s+/g, '_').substring(0, 100) || 'transcript';
}

function renderMarkdown(text) {
    return text
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/^### (.+)$/gm, '<h3 class="font-semibold mt-4 mb-2">$1</h3>')
        .replace(/^## (.+)$/gm, '<h3 class="font-semibold text-lg mt-5 mb-2">$1</h3>')
        .replace(/^# (.+)$/gm, '<h2 class="font-semibold text-xl mt-6 mb-3">$1</h2>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/^\- (.+)$/gm, '<li class="ml-4 list-disc">$1</li>')
        .replace(/^\d+\.\s+(.+)$/gm, '<li class="ml-4 list-decimal">$1</li>')
        .replace(/\n\n/g, '<br><br>')
        .replace(/\n/g, '<br>');
}
</script>
